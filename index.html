<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EldarX • Emergency Hamburg Script</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 20px #9f00ff, 0 0 40px #9f00ff; }
            50% { text-shadow: 0 0 40px #9f00ff, 0 0 80px #9f00ff; }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400%); }
        }

        .search-text {
            animation: fadeInUp 1.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .join-text {
            animation: fadeInUp 1.8s cubic-bezier(0.23, 1, 0.32, 1) 0.4s forwards;
        }

        .discord-link {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        .subtle-grid {
            background-image: 
                linear-gradient(rgba(34, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .terminal-dot {
            animation: blink 1.2s step-end infinite;
        }
    </style>
</head>
<body class="bg-black text-white overflow-hidden min-h-screen flex items-center justify-center relative font-sans">
    
    <div class="absolute inset-0 subtle-grid pointer-events-none"></div>

    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-[#9f00ff]/5 to-transparent pointer-events-none"
         style="animation: scanline 8s linear infinite;"></div>

    <div class="relative z-10 text-center max-w-3xl px-6">

        <div class="flex items-center justify-center gap-3 mb-6 search-text">
            <div class="text-6xl md:text-7xl font-semibold tracking-tighter text-[#9f00ff] font-mono flex items-center">
                searching an
                <span class="mx-3 text-white">EMH Script</span>
                ?
                <span class="ml-2 flex gap-1 text-4xl text-[#9f00ff]">
                    <span class="terminal-dot">.</span>
                    <span class="terminal-dot" style="animation-delay: 0.3s">.</span>
                    <span class="terminal-dot" style="animation-delay: 0.6s">.</span>
                </span>
            </div>
        </div>

        <div class="text-5xl md:text-6xl font-bold tracking-[-2px] text-white join-text mb-16">
            Join EldarX today!
        </div>

        <a href="https://discord.gg/moon-hub" 
           target="_blank"
           class="discord-link group inline-flex items-center justify-center px-16 py-8 text-6xl md:text-7xl font-bold bg-transparent border-4 border-[#9f00ff] rounded-3xl hover:bg-[#9f00ff] hover:text-black transition-all duration-300 tracking-tighter">
            <span class="group-hover:scale-110 transition-transform">discord.gg/moon-hub</span>
        </a>

    </div>

    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {}
            }
        }
    </script>
</body>
</html>
